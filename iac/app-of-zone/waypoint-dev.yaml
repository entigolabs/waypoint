apiVersion: tenancy.entigo.com/v1alpha1
kind: Zone
metadata:
  name: waypoint-dev
  labels:
    tenancy.entigo.com/default-zone: "true"
spec:
  pools:
    - name: default
      requirements:
        - key: instance-type
          values:
            - t3.large
        - key: capacity-type
          value: ON_DEMAND
        - key: min-size
          value: 1
        - key: max-size
          value: 2
---
apiVersion: v1
kind: Namespace
metadata:
  name: waypoint-dev
  labels:
    tenancy.entigo.com/zone: waypoint-dev
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "1"

