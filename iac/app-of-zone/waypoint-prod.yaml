apiVersion: tenancy.entigo.com/v1alpha1
kind: Zone
metadata:
  name: waypoint-prod
spec:
  pools:
    - name: default
      requirements:
        - key: instance-type
          values:
            - t3.large
        - key: capacity-type
          value: ON_DEMAND
        - key: min-size
          value: 1
        - key: max-size
          value: 2
---
apiVersion: v1
kind: Namespace
metadata:
  name: waypoint-prod
  labels:
    tenancy.entigo.com/zone: waypoint-prod
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-waypoint-prod
  namespace: waypoint-prod
spec:
  destination:
    server: https://kubernetes.default.svc
  project: waypoint-prod
  sources:
  - repoURL: git@github.com:entigolabs/waypoint.git
    path: iac/app-of-prod
    targetRevision: HEAD
  syncPolicy:
    retry:
      backoff:
        duration: 15s
      limit: 6
    syncOptions:
    - RespectIgnoreDifferences=true
    - Retry=true
    - ServerSideApply=true
    automated:
      selfHeal: true
      prune: true
      enabled: true
