apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-db-tern
data:
  tern.conf: |
    [database]
    host = {{`{{env "endpoint"}}`}}
    port = {{`{{env "port"}}`}}
    database = {{ .Values.database.name | required "database.name is required" | quote }}
    user = {{`{{env "username"}}`}}
    password = {{`{{env "password"}}`}}
    version_table = sys.schema_version
    sslmode = prefer

    [data]
    sysRWRole = sys_rw
    sysRRole = sys_r
    coreRWRole = core_rw
    coreRRole = core_r
