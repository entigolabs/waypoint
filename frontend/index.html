<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./src/assets/entigo-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entigo Portal minimal</title>
</head>

<body style="margin: 0; background-color: #141414;">

  <div id="unsupported-browser" style="display: none; justify-content: center; align-items: center; min-height: 100vh; background-color: #141414; font-family: sans-serif; color: #dcdcdc; padding: 24px; box-sizing: border-box;">
    <div style="max-width: 520px; width: 100%; background-color: #1a1a1a; border: 1px solid #1c293d; border-radius: 8px; padding: 32px;">
      <h1 style="margin: 0 0 12px; font-size: 20px; font-weight: 600;">Browser not supported</h1>
      <p style="margin: 0 0 16px; color: #aaa; line-height: 1.6;">
        Your browser is missing features required to run this application. Please upgrade to a modern browser.
      </p>
      <p style="margin: 0 0 8px; color: #aaa; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">
        Supported browsers
      </p>
      <ul style="margin: 0; padding-left: 20px; line-height: 2;">
        <li>Google Chrome 80+</li>
        <li>Mozilla Firefox 75+</li>
        <li>Microsoft Edge 80+</li>
        <li>Safari 13.1+</li>
      </ul>
    </div>
  </div>

  <div id="root"></div>

  <script>
    (function () {
      var isSupported = true;

      try {
        if (typeof fetch === 'undefined') isSupported = false;
        if (typeof Promise === 'undefined' || typeof Promise.allSettled !== 'function') isSupported = false;
        if (typeof globalThis === 'undefined') isSupported = false;
        if (typeof CSS === 'undefined' || typeof CSS.supports !== 'function' || !CSS.supports('color', 'var(--c)')) isSupported = false;
      } catch (e) {
        isSupported = false;
      }
      if (!isSupported) {
        document.getElementById('unsupported-browser').style.display = 'flex';
        document.getElementById('root').style.display = 'none';
      }
    })();
  </script>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
