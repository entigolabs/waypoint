worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format otel_json escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"body":"$request",'
            '"severity_text":"INFO",'
            '"attributes":{'
                '"http.request.method":"$request_method",'
                '"url.path":"$uri",'
                '"url.scheme":"$scheme",'
                '"http.response.status_code":$status,'
                '"http.response.body.size":$body_bytes_sent,'
                '"network.protocol.version":"$server_protocol",'
                '"client.address":"$remote_addr",'
                '"user_agent.original":"$http_user_agent",'
                '"http.request.duration_ms":$request_time'
            '}'
        '}';

    server_tokens off;

    # Default access log (keep for non-server-block requests)
    access_log  /var/log/nginx/access.log  otel_json;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    server {
        listen 8080;
        root /app;
        server_name portal-front;
        add_header Content-Security-Policy "frame-ancestors 'none';" always;
        add_header X-Frame-Options "DENY" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        error_log /dev/stdout;
        access_log /dev/stdout otel_json;
    }
}