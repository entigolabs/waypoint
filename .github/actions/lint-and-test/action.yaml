name: Lint and test
description: Runs golangci-lint and the test suite

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: backend/go.mod
        cache-dependency-path: backend/go.sum
    - uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        working-directory: backend
    - run: make test-ci
      shell: bash
      working-directory: backend
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results
        path: backend/build/
