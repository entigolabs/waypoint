name: Lint and test
description: Runs golangci-lint and the test suite

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - uses: golangci/golangci-lint-action@v6
      with:
        version: latest
    - run: make test-ci
      shell: bash
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results
        path: build/
