name: Lint and test front
description: Runs eslint and the test suite

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: npm
        cache-dependency-path: frontend/package-lock.json
    - run: npm ci
      working-directory: frontend
      shell: bash
    - run: npm run lint
      working-directory: frontend
      shell: bash
    - run: npm test
      working-directory: frontend
      shell: bash
