name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v1.2.3)'
        required: true

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  CHART_PATH: helm/application
  CHART_NAME: waypoint-helm
  IMAGE_NAME: waypoint

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/lint-and-test

  lint-helm:
    name: Lint Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/lint-helm
        with:
          chart-path: ${{ env.CHART_PATH }}

  lint-and-test-front:
    name: Lint and test frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/lint-and-test-front

  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

  build-back:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [lint-and-test, version]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
      - id: push
        uses: docker/build-push-action@v7
        with:
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            VERSION=${{ needs.version.outputs.version }}
          context: backend
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          predicate-type: https://cyclonedx.org/bom
          predicate-path: sbom.cdx.json
          push-to-registry: true

  build-db:
    name: Build DB
    runs-on: ubuntu-latest
    needs: [lint-and-test, version]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-db
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
      - id: push
        uses: docker/build-push-action@v7
        with:
          context: backend/db
          file: backend/db/Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-db@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-db
          subject-digest: ${{ steps.push.outputs.digest }}
          predicate-type: https://cyclonedx.org/bom
          predicate-path: sbom.cdx.json
          push-to-registry: true

  build-front:
    name: Build frontend
    runs-on: ubuntu-latest
    needs: [ lint-and-test-front, version ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: npm install
        run: npm install
        working-directory: frontend
      - name: npm build
        run: npm run build
        working-directory: frontend
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-front
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
      - id: push
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-front@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-front
          subject-digest: ${{ steps.push.outputs.digest }}
          predicate-type: https://cyclonedx.org/bom
          predicate-path: sbom.cdx.json
          push-to-registry: true

  build-helm:
    name: Build Helm chart
    runs-on: ubuntu-latest
    needs: [lint-helm, build-back, build-db, build-front, version]
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Update chart version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          VERSION="${VERSION#v}"
          # Publish as RC for dev
          yq -i ".version = \"${VERSION}-rc\"" ${{ env.CHART_PATH }}/Chart.yaml
          yq -i ".appVersion = \"${{ needs.version.outputs.version }}\"" ${{ env.CHART_PATH }}/Chart.yaml
          echo "BUILD_VERSION=${VERSION}-rc" >> $GITHUB_ENV
      - name: Package Helm chart
        run: helm package ${{ env.CHART_PATH }}
      - name: Push Helm chart to GHCR
        run: helm push ${{ env.CHART_NAME }}-${{ env.BUILD_VERSION }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}


  dev:
    needs: [build-helm]
    uses: ./.github/workflows/deploy-argocd.yaml
    with:
      environment: dev
      app_name: waypoint
    secrets:
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}

  promote-helm:
    name: Promote Helm chart to stable
    runs-on: ubuntu-latest
    environment: prod
    needs: [dev, version]
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push stable version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          VERSION="${VERSION#v}"
          # Set stable version (no -rc suffix)
          yq -i ".version = \"${VERSION}\"" ${{ env.CHART_PATH }}/Chart.yaml
          yq -i ".appVersion = \"${{ needs.version.outputs.version }}\"" ${{ env.CHART_PATH }}/Chart.yaml
          helm package ${{ env.CHART_PATH }}
          helm push ${{ env.CHART_NAME }}-${VERSION}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

  prod:
    needs: [promote-helm]
    uses: ./.github/workflows/deploy-argocd.yaml
    with:
      environment: prod
      app_name: waypoint
    secrets:
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
