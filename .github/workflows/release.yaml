name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v1.2.3)'
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_PATH: helm/application
  CHART_NAME: waypoint-helm
  IMAGE_NAME: waypoint

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/lint-and-test

  lint-helm:
    name: Lint Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/lint-helm
        with:
          chart-path: ${{ env.CHART_PATH }}
          set-args: >-
            --set ingress.host=test.example.com
            --set server.config.allowedOrigins=https://example.com
          token: ${{ secrets.GITHUB_TOKEN }}

  changes:
    name: Detect changes since last release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

  build-app:
    name: Build app
    runs-on: ubuntu-latest
    needs: [lint-and-test, changes]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.changes.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          build-args: GITHUB_SHA=${GITHUB_SHA}
          context: backend
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-db:
    name: Build DB
    runs-on: ubuntu-latest
    needs: [lint-and-test, changes]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-db
          tags: |
            type=raw,value=${{ needs.changes.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: backend/db
          file: backend/db/Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-helm:
    name: Build Helm chart
    runs-on: ubuntu-latest
    needs: [lint-helm, build-app, build-db, changes]
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Update chart version
        run: |
          VERSION="${{ needs.changes.outputs.version }}"
          VERSION="${VERSION#v}"
          yq -i ".version = \"$VERSION\"" ${{ env.CHART_PATH }}/Chart.yaml
          yq -i ".appVersion = \"${{ needs.changes.outputs.version }}\"" ${{ env.CHART_PATH }}/Chart.yaml
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
      - name: Package Helm chart
        run: helm package ${{ env.CHART_PATH }}
      - name: Push Helm chart to GHCR
        run: helm push ${{ env.CHART_NAME }}-${{ env.BUILD_VERSION }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}
