name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v1.2.3)'
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: waypoint

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/lint-and-test

  changes:
    name: Detect changes since last release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      db: ${{ steps.filter.outputs.db }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      - name: Filter paths
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "db=true" >> $GITHUB_OUTPUT
            echo "api=true" >> $GITHUB_OUTPUT
          else
            PREV_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | sed -n '2p')
            if [ -z "$PREV_TAG" ]; then
              echo "db=true" >> $GITHUB_OUTPUT
              echo "api=true" >> $GITHUB_OUTPUT
            else
              DB=$(git diff --name-only ${PREV_TAG} HEAD | grep -q '^db/' && echo true || echo false)
              API=$(git diff --name-only ${PREV_TAG} HEAD | grep -q '^openapi/openapi.yaml' && echo true || echo false)
              echo "db=${DB}" >> $GITHUB_OUTPUT
              echo "api=${API}" >> $GITHUB_OUTPUT
            fi
          fi

  build-app:
    name: Build app
    runs-on: ubuntu-latest
    needs: [lint-and-test, changes]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.changes.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          build-args: GITHUB_SHA=${GITHUB_SHA}
          context: .
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-db:
    name: Build DB
    runs-on: ubuntu-latest
    needs: [lint-and-test, changes]
    if: needs.changes.outputs.db == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}-db
          tags: |
            type=raw,value=${{ needs.changes.outputs.version }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: db
          file: db/Dockerfile
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64,linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-api:
    name: Generate API client
    runs-on: ubuntu-latest
    needs: [lint-and-test, changes]
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Download generator
        run: wget https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.20.0/openapi-generator-cli-7.20.0.jar -O openapi-generator-cli.jar
      - name: Generate client code
        run: |
          java -jar openapi-generator-cli.jar generate \
            -c openapi/config-typescript.yaml \
            --additional-properties npmVersion=${{ needs.changes.outputs.version }},snapshot=false \
            --openapi-normalizer REF_AS_PARENT_IN_ALLOF=true
      - name: Generate package-lock.json
        working-directory: out/typescript
        run: npm i --package-lock-only
      - uses: actions/upload-artifact@v7
        with:
          name: codegen-source
          path: out/

  publish-api:
    name: Publish API client
    runs-on: ubuntu-latest
    needs: [changes, generate-api]
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: codegen-source
          path: out/
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'
          cache-dependency-path: out/typescript/package-lock.json
      - name: Build and publish
        working-directory: out/typescript
        run: |
          npm install
          npm run build
          echo -e "\nsrc/**/*" >> .npmignore
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
