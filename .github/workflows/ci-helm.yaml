name: CI Helm

on:
  push:
    branches:
      - main
    paths:
      - helm/application/**
  pull_request:
    branches:
      - main
    paths:
      - helm/application/**

env:
  CHART_PATH: helm/application

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/lint-helm
        with:
          chart-path: ${{ env.CHART_PATH }}
          set-args: >-
            --set ingress.host=test.example.com
            --set server.config.allowedOrigins=https://example.com
